<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 虛擬試身室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 自訂上傳區塊的虛線樣式 */
        .upload-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 生成時的掃描動畫 */
        .scanning-bar {
            width: 100%;
            height: 4px;
            background: rgba(59, 130, 246, 0.8);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 2s ease-in-out infinite alternate;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- 頂部導航列 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI 虛擬試身室 <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full ml-2">PRO MAX</span></h1>
            <button onclick="resetApp()" class="text-sm text-gray-500 hover:text-blue-600 font-medium">
                <i class="fa-solid fa-rotate-right mr-1"></i>重設
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-6 md:p-8">
                <p class="text-gray-600 mb-2 text-center text-lg">上傳一張你嘅正面相，再上傳一張想試嘅衣服相。</p>
                <p class="text-blue-500 mb-8 text-center text-sm font-medium"><i class="fa-solid fa-circle-info mr-1"></i> 全新升級：AI 會根據你的身形與姿勢進行<b>深度重繪與融合</b>，呈現真實穿著效果，絕非簡單貼圖！</p>

                <!-- 圖片上傳區域 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    
                    <!-- 人物照片上傳 -->
                    <div class="flex flex-col">
                        <label class="font-semibold text-gray-700 mb-2"><i class="fa-solid fa-user mr-2 text-blue-500"></i>1. 上傳人物照片</label>
                        <div class="upload-zone rounded-xl h-64 flex flex-col items-center justify-center relative cursor-pointer overflow-hidden" onclick="document.getElementById('personInput').click()">
                            <input type="file" id="personInput" class="hidden" accept="image/*" onchange="previewImage(event, 'personPreview', 'personPlaceholder')">
                            
                            <div id="personPlaceholder" class="text-center p-4">
                                <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-400 mb-3"></i>
                                <p class="text-gray-500 text-sm">點擊上傳或拖曳圖片至此</p>
                                <p class="text-xs text-gray-400 mt-1">建議：光線充足、無物件遮擋身體</p>
                            </div>
                            
                            <img id="personPreview" class="hidden absolute inset-0 w-full h-full object-contain bg-gray-100" alt="人物預覽">
                        </div>
                    </div>

                    <!-- 衣服照片上傳 -->
                    <div class="flex flex-col">
                        <label class="font-semibold text-gray-700 mb-2"><i class="fa-solid fa-shirt mr-2 text-blue-500"></i>2. 上傳衣服照片</label>
                        <div class="upload-zone rounded-xl h-64 flex flex-col items-center justify-center relative cursor-pointer overflow-hidden" onclick="document.getElementById('clothingInput').click()">
                            <input type="file" id="clothingInput" class="hidden" accept="image/*" onchange="previewImage(event, 'clothingPreview', 'clothingPlaceholder')">
                            
                            <div id="clothingPlaceholder" class="text-center p-4">
                                <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-400 mb-3"></i>
                                <p class="text-gray-500 text-sm">點擊上傳衣服圖片</p>
                                <p class="text-xs text-gray-400 mt-1">建議：背景乾淨的平鋪衣服照</p>
                            </div>
                            
                            <img id="clothingPreview" class="hidden absolute inset-0 w-full h-full object-contain bg-gray-100" alt="衣服預覽">
                        </div>
                    </div>
                </div>

                <!-- 生成按鈕 -->
                <div class="flex flex-col items-center justify-center mb-8">
                    <button id="generateBtn" onclick="generateTryOn()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded-full shadow-lg transform transition hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none text-lg w-full max-w-sm">
                        <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>開始精準 AI 換裝
                    </button>
                    <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden"></p>
                </div>

                <!-- 結果顯示區 -->
                <div id="resultSection" class="hidden flex-col items-center border-t border-gray-100 pt-8 mt-4">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">✨ AI 真實換裝結果 ✨</h2>
                    
                    <!-- 載入中動畫 -->
                    <div id="loadingState" class="hidden flex-col items-center py-10 w-full max-w-md">
                        <div class="relative w-full h-64 bg-gray-100 rounded-xl overflow-hidden flex items-center justify-center mb-6 border border-gray-200">
                            <!-- 疊加預覽以顯示 AI 正在處理 -->
                            <div class="absolute inset-0 flex">
                                <img id="loadingPersonImg" class="w-1/2 h-full object-contain opacity-50">
                                <img id="loadingClothingImg" class="w-1/2 h-full object-contain opacity-50">
                            </div>
                            <div class="absolute inset-0 bg-white bg-opacity-70 backdrop-blur-md"></div>
                            <div class="z-10 flex flex-col items-center">
                                <div class="loader mb-4"></div>
                                <p class="text-blue-700 font-bold text-lg">正在深度運算及重繪...</p>
                                <p id="loadingText" class="text-sm text-gray-700 mt-2 font-medium bg-white px-3 py-1 rounded-full shadow-sm">正在計算布料垂墜感與光影</p>
                            </div>
                            <div class="scanning-bar"></div>
                        </div>
                    </div>

                    <!-- 最終結果 -->
                    <div id="finalResult" class="hidden w-full max-w-md flex-col items-center">
                        <div class="relative rounded-xl overflow-hidden shadow-2xl bg-gray-100 w-full aspect-[3/4] flex items-center justify-center border border-gray-200">
                            <img id="resultImage" class="w-full h-full object-contain" alt="AI 換裝完成圖">
                        </div>
                        <div class="flex justify-center gap-4 mt-6 w-full">
                            <button onclick="downloadResult()" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white py-3 px-4 rounded-xl shadow transition font-medium flex justify-center items-center">
                                <i class="fa-solid fa-download mr-2"></i>儲存高畫質圖片
                            </button>
                            <button onclick="shareResult()" class="flex-1 border border-gray-300 hover:bg-gray-50 text-gray-700 py-3 px-4 rounded-xl shadow-sm transition font-medium flex justify-center items-center">
                                <i class="fa-solid fa-share-nodes mr-2"></i>分享造型
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // 設定 API Key (系統會自動注入環境變數)
        const apiKey = ""; 

        // 處理圖片預覽
        function previewImage(event, previewId, placeholderId) {
            const input = event.target;
            const preview = document.getElementById(previewId);
            const placeholder = document.getElementById(placeholderId);

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 動態載入文字效果
        const loadingTexts = [
            "正在進行骨架與身形定位...",
            "嚴格禁止簡單貼圖，正在進行深度融合...",
            "AI 正在根據姿勢重繪布料摺痕...",
            "統一環境光線與陰影細節...",
            "最後渲染中，確保影像真實自然..."
        ];

        // 呼叫 Gemini AI 圖像生成模型
        async function fetchAIImage(personDataUrl, clothingDataUrl) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
            
            // 提取 Base64 資料與 MimeType
            const personBase64 = personDataUrl.split(',')[1];
            const personMime = personDataUrl.split(';')[0].split(':')[1];
            const clothingBase64 = clothingDataUrl.split(',')[1];
            const clothingMime = clothingDataUrl.split(';')[0].split(':')[1];

            // 【核心修改】嚴格且詳細的 Prompt，強制要求重繪而非疊加
            const prompt = `[CRITICAL INSTRUCTION]
            Task: High-Fidelity Photorealistic Virtual Try-On.
            You are provided with two images: 
            1. A photograph of a person. 
            2. A photograph of a piece of clothing.

            Your ONLY goal is to generate a pristine, highly realistic, unified photograph of the EXACT person from Image 1 naturally wearing the EXACT garment from Image 2.

            STRICT RULES TO FOLLOW:
            - DO NOT copy and paste. 
            - DO NOT just overlay or superimpose Image 2 onto Image 1. 
            - You MUST completely REDRAW the clothing onto the person's body so that the fabric naturally folds, drapes, and stretches according to their actual body shape and pose.
            - The lighting, shadows, and color temperature of the new clothing MUST perfectly match the environment and lighting of Image 1.
            - You MUST perfectly preserve the person's face, skin tone, hairstyle, original identity, body proportions, and the original background without any distortion.
            - The final output must look exactly like an authentic photograph taken with a camera, with zero signs of editing, collage, or awkward overlapping.`;

            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: personMime, data: personBase64 } },
                        { inlineData: { mimeType: clothingMime, data: clothingBase64 } }
                    ]
                }],
                generationConfig: {
                    responseModalities: ["IMAGE"] // 要求輸出為圖片
                }
            };

            // 實現錯誤重試機制 (Exponential backoff)
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let attempt = 0; attempt <= delays.length; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
                    }

                    const result = await response.json();
                    
                    // 解析回傳的 Base64 圖片數據
                    const generatedPart = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                    const base64Image = generatedPart?.inlineData?.data;
                    const mimeType = generatedPart?.inlineData?.mimeType || 'image/png';

                    if (base64Image) {
                        return `data:${mimeType};base64,${base64Image}`;
                    } else {
                        throw new Error("AI 模型沒有回傳圖片數據，請稍後再試。");
                    }
                } catch (error) {
                    console.warn(`嘗試第 ${attempt + 1} 次失敗:`, error.message);
                    if (attempt === delays.length) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                }
            }
        }

        // 執行換裝過程
        async function generateTryOn() {
            const personImg = document.getElementById('personPreview').src;
            const clothingImg = document.getElementById('clothingPreview').src;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.classList.add('hidden');

            // 檢查是否兩張圖都已上傳
            if (!personImg || personImg === window.location.href || 
                !clothingImg || clothingImg === window.location.href) {
                alert("請先上傳「人物照片」同「衣服照片」！");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const resultSection = document.getElementById('resultSection');
            const loadingState = document.getElementById('loadingState');
            const finalResult = document.getElementById('finalResult');
            const loadingText = document.getElementById('loadingText');

            // 設定 UI 進入載入狀態
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>深度融合運算中...';
            
            // 顯示動畫預覽圖
            document.getElementById('loadingPersonImg').src = personImg;
            document.getElementById('loadingClothingImg').src = clothingImg;

            resultSection.classList.remove('hidden');
            resultSection.classList.add('flex');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            finalResult.classList.add('hidden');
            finalResult.classList.remove('flex');

            // 捲動到結果區
            resultSection.scrollIntoView({ behavior: 'smooth' });

            // 輪播載入文字
            let textIndex = 0;
            const textInterval = setInterval(() => {
                textIndex = (textIndex + 1) % loadingTexts.length;
                loadingText.innerText = loadingTexts[textIndex];
            }, 3000);

            try {
                // 呼叫真實的 AI API
                const generatedImageDataUrl = await fetchAIImage(personImg, clothingImg);

                // 成功獲取圖片，更新 UI
                document.getElementById('resultImage').src = generatedImageDataUrl;
                
                loadingState.classList.add('hidden');
                loadingState.classList.remove('flex');
                finalResult.classList.remove('hidden');
                finalResult.classList.add('flex');
                
            } catch (error) {
                // 處理錯誤
                console.error("生成失敗:", error);
                errorMsg.innerText = `生成失敗: ${error.message} (可能原因：圖片過於複雜，請嘗試另一張照片)`;
                errorMsg.classList.remove('hidden');
                
                resultSection.classList.add('hidden');
                resultSection.classList.remove('flex');
            } finally {
                // 清理工作並恢復按鈕狀態
                clearInterval(textInterval);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>重新生成';
            }
        }

        // 下載圖片
        function downloadResult() {
            const img = document.getElementById('resultImage');
            if (!img.src || img.src === window.location.href) return;
            
            const link = document.createElement('a');
            link.download = `ai-tryon-pro-${new Date().getTime()}.png`;
            link.href = img.src;
            link.click();
        }

        // 重設 App
        function resetApp() {
            document.getElementById('personInput').value = '';
            document.getElementById('clothingInput').value = '';
            
            document.getElementById('personPreview').classList.add('hidden');
            document.getElementById('personPreview').src = '';
            document.getElementById('personPlaceholder').classList.remove('hidden');
            
            document.getElementById('clothingPreview').classList.add('hidden');
            document.getElementById('clothingPreview').src = '';
            document.getElementById('clothingPlaceholder').classList.remove('hidden');
            
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('flex');
            document.getElementById('errorMsg').classList.add('hidden');
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>開始精準 AI 換裝';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 簡單分享功能
        function shareResult() {
            const img = document.getElementById('resultImage');
            if (navigator.share && img.src) {
                navigator.share({
                    title: '我的 AI 換裝結果',
                    text: '快啲嚟睇下我用 AI 虛擬試身室整嘅真實新造型！',
                    url: window.location.href,
                }).catch(console.error);
            } else {
                alert('你嘅瀏覽器唔支援自動分享，請直接撳「儲存圖片」分享啦！');
            }
        }
    </script>
</body>
</html>
