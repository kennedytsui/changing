<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 虛擬試身室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 自訂上傳區塊的虛線樣式 */
        .upload-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- 頂部導航列 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI 虛擬試身室</h1>
            <button onclick="resetApp()" class="text-sm text-gray-500 hover:text-blue-600 font-medium">
                <i class="fa-solid fa-rotate-right mr-1"></i>重設
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-6 md:p-8">
                <p class="text-gray-600 mb-8 text-center">上傳一張你嘅正面相，再上傳一張你想試嘅衣服相，AI 就會幫你自動換裝！</p>

                <!-- 圖片上傳區域 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    
                    <!-- 人物照片上傳 -->
                    <div class="flex flex-col">
                        <label class="font-semibold text-gray-700 mb-2"><i class="fa-solid fa-user mr-2 text-blue-500"></i>1. 上傳人物照片</label>
                        <div class="upload-zone rounded-xl h-64 flex flex-col items-center justify-center relative cursor-pointer" onclick="document.getElementById('personInput').click()">
                            <input type="file" id="personInput" class="hidden" accept="image/*" onchange="previewImage(event, 'personPreview', 'personPlaceholder')">
                            
                            <div id="personPlaceholder" class="text-center p-4">
                                <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-400 mb-3"></i>
                                <p class="text-gray-500 text-sm">點擊上傳或拖曳圖片至此</p>
                                <p class="text-xs text-gray-400 mt-1">建議使用清晰正面照</p>
                            </div>
                            
                            <img id="personPreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-xl" alt="人物預覽">
                        </div>
                    </div>

                    <!-- 衣服照片上傳 -->
                    <div class="flex flex-col">
                        <label class="font-semibold text-gray-700 mb-2"><i class="fa-solid fa-shirt mr-2 text-blue-500"></i>2. 上傳衣服照片</label>
                        <div class="upload-zone rounded-xl h-64 flex flex-col items-center justify-center relative cursor-pointer" onclick="document.getElementById('clothingInput').click()">
                            <input type="file" id="clothingInput" class="hidden" accept="image/*" onchange="previewImage(event, 'clothingPreview', 'clothingPlaceholder')">
                            
                            <div id="clothingPlaceholder" class="text-center p-4">
                                <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-400 mb-3"></i>
                                <p class="text-gray-500 text-sm">點擊上傳衣服圖片</p>
                                <p class="text-xs text-gray-400 mt-1">建議使用平鋪衣服照</p>
                            </div>
                            
                            <img id="clothingPreview" class="hidden absolute inset-0 w-full h-full object-contain bg-gray-100 rounded-xl" alt="衣服預覽">
                        </div>
                    </div>
                </div>

                <!-- 生成按鈕 -->
                <div class="flex justify-center mb-8">
                    <button id="generateBtn" onclick="generateTryOn()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded-full shadow-lg transform transition hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed text-lg">
                        <i class="fa-solid fa-wand-magic mr-2"></i>立即 AI 換裝
                    </button>
                </div>

                <!-- 結果顯示區 -->
                <div id="resultSection" class="hidden flex-col items-center border-t border-gray-100 pt-8 mt-4">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">✨ 生成結果 ✨</h2>
                    
                    <!-- 載入中動畫 -->
                    <div id="loadingState" class="hidden flex-col items-center py-10">
                        <div class="loader mb-4"></div>
                        <p class="text-blue-600 font-medium">AI 正在為你進行精準換裝，請稍候...</p>
                        <p class="text-xs text-gray-400 mt-2">（模擬進度：分析身型 ➔ 提取衣物 ➔ 融合光影）</p>
                    </div>

                    <!-- 最終結果 -->
                    <div id="finalResult" class="hidden w-full max-w-md">
                        <div class="relative rounded-xl overflow-hidden shadow-2xl bg-gray-100 h-96 flex items-center justify-center">
                            <!-- 這裡用 Canvas 模擬合成結果 -->
                            <canvas id="resultCanvas" class="w-full h-full object-cover"></canvas>
                        </div>
                        <div class="flex justify-center gap-4 mt-6">
                            <button onclick="downloadResult()" class="bg-gray-800 hover:bg-gray-900 text-white py-2 px-6 rounded-lg shadow transition">
                                <i class="fa-solid fa-download mr-2"></i>儲存圖片
                            </button>
                            <button onclick="shareResult()" class="border border-gray-300 hover:bg-gray-50 text-gray-700 py-2 px-6 rounded-lg shadow-sm transition">
                                <i class="fa-solid fa-share-nodes mr-2"></i>分享
                            </button>
                        </div>
                        
                        <!-- 系統提示 -->
                        <div class="mt-6 p-4 bg-blue-50 text-blue-800 text-sm rounded-lg border border-blue-100">
                            <strong>💡 開發者提示：</strong> 這是一個前端 UI 介面。如果要達到完美的商業級 AI 換裝效果，需要將此網頁連接到後端的 AI API（例如 VTON, Replicate 等）。目前的預覽為模擬合成效果！
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // 處理圖片預覽
        function previewImage(event, previewId, placeholderId) {
            const input = event.target;
            const preview = document.getElementById(previewId);
            const placeholder = document.getElementById(placeholderId);

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 模擬生成過程
        function generateTryOn() {
            const personImg = document.getElementById('personPreview').src;
            const clothingImg = document.getElementById('clothingPreview').src;

            // 檢查是否兩張圖都已上傳
            if (!personImg || personImg === window.location.href || 
                !clothingImg || clothingImg === window.location.href) {
                alert("請先上傳人物及衣服照片！");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const resultSection = document.getElementById('resultSection');
            const loadingState = document.getElementById('loadingState');
            const finalResult = document.getElementById('finalResult');

            // 顯示載入狀態
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>處理中...';
            resultSection.classList.remove('hidden');
            resultSection.classList.add('flex');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            finalResult.classList.add('hidden');

            // 模擬網絡延遲 (3秒後顯示結果)
            setTimeout(() => {
                loadingState.classList.add('hidden');
                loadingState.classList.remove('flex');
                finalResult.classList.remove('hidden');
                
                // 恢復按鈕
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic mr-2"></i>再次換裝';

                // 畫出模擬合成圖
                drawMockup(personImg, clothingImg);

                // 捲動到結果區
                resultSection.scrollIntoView({ behavior: 'smooth' });
            }, 3000);
        }

        // 簡單的 Canvas 模擬合成 (將衣服疊加在人像上)
        function drawMockup(personSrc, clothingSrc) {
            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');
            
            const pImg = new Image();
            const cImg = new Image();
            
            pImg.onload = () => {
                // 設定 canvas 大小與人物照片相同
                canvas.width = pImg.width;
                canvas.height = pImg.height;
                
                // 畫上人物
                ctx.drawImage(pImg, 0, 0, canvas.width, canvas.height);
                
                cImg.onload = () => {
                    // 模擬把衣服放在中間 (這只是一個非常簡化的視覺模擬)
                    const cWidth = canvas.width * 0.6; // 衣服佔據寬度比例
                    const cHeight = cImg.height * (cWidth / cImg.width);
                    const x = (canvas.width - cWidth) / 2;
                    const y = canvas.height * 0.25; // 大約放在胸前位置
                    
                    // 加上一點透明度讓它看起來像合成
                    ctx.globalAlpha = 0.9;
                    ctx.drawImage(cImg, x, y, cWidth, cHeight);
                    ctx.globalAlpha = 1.0;
                };
                cImg.src = clothingSrc;
            };
            pImg.src = personSrc;
        }

        // 下載圖片
        function downloadResult() {
            const canvas = document.getElementById('resultCanvas');
            const link = document.createElement('a');
            link.download = 'ai-tryon-result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 重設 App
        function resetApp() {
            document.getElementById('personInput').value = '';
            document.getElementById('clothingInput').value = '';
            
            document.getElementById('personPreview').classList.add('hidden');
            document.getElementById('personPreview').src = '';
            document.getElementById('personPlaceholder').classList.remove('hidden');
            
            document.getElementById('clothingPreview').classList.add('hidden');
            document.getElementById('clothingPreview').src = '';
            document.getElementById('clothingPlaceholder').classList.remove('hidden');
            
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('flex');
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-wand-magic mr-2"></i>立即 AI 換裝';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 簡單分享功能
        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: '我的 AI 換裝結果',
                    text: '快啲嚟睇下我用 AI 虛擬試身室整嘅新造型！',
                    url: window.location.href,
                }).catch(console.error);
            } else {
                alert('你嘅瀏覽器唔支援分享功能，請直接下載圖片分享啦！');
            }
        }
    </script>
</body>
</html>
